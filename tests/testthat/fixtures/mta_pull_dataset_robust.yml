        ,{"open_dataset_id":"426z-f5nc","dataset_title":"MTA Bridges and Tunnels Incident Response Times: Beginning 2010","type":"dataset","agency":"MTA Bridges & Tunnels","posting_frequency":"Monthly","description":"The dataset contains incident response data from B&T’s seven bridges and two tunnels in New York City. Each record represents a monthly summary for a facility with the number of incidents responded to and the average response time for all incidents. Response time is defined as the time elapsed between the reporting of an incident and the arrival of the emergency response vehicle.","status":"PUBLISHED","dataset_created_at":"2025-05-21T12:47:04.000","plan_submission_date":"COMPLETE","nys_url":{"url":"https://data.ny.gov/d/426z-f5nc"}}
