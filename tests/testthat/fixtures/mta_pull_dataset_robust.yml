        ,{"open_dataset_id":"pwa9-tmie","dataset_title":"MTA Wi-Fi Locations","type":"dataset","agency":"Metropolitan Transportation Authority","posting_frequency":"Static – Not Updated","description":"The MTA contracted with Transit Wireless to provide WIFI access and cell service to all underground subway stations. These services began being provided in 2011 and were available at all of those stations in January 2017. This dataset is a snapshot of the stations where Wi-Fi was available in part of 2015 and 2016.","status":"PUBLISHED","dataset_created_at":"2015-12-01T21:10:57.000","plan_submission_date":"COMPLETE","nys_url":{"url":"https://data.ny.gov/d/pwa9-tmie"}}
