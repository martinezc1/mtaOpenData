        ,{"open_dataset_id":"pssf-s7fa","dataset_title":"MTA 2025-2044 20-Year Needs Assessment Bus Fleet Inventory","type":"dataset","agency":"Metropolitan Transportation Authority","posting_frequency":"Static – Not Updated","description":"The 2025-2044 20-Year Needs Assessment outlines capital work the MTA needs to do over the next two decades to keep the region moving. The MTA developed a three-part plan to secure the foundation of the system and ensure another 100 years of service by reconstructing, renewing, and modernizing the system. This dataset includes data on all revenue bus fleets and does not include data on Access-A-Ride paratransit vehicles. For each fleet type (standard, articulated, express), and power source (Zero Emissions, or Any Type, which includes both Zero Emissions and non-Zero Emission buses), there is data for the number of buses, their useful lives, and the percent of buses beyond their useful lives. The dataset also includes the number of buses planned to be ordered in the 2025–2029, 2030–2034, 2035–2039, and 2040–2044 capital programs by type and power source.","status":"PUBLISHED","dataset_created_at":"2023-10-19T13:07:40.000","plan_submission_date":"COMPLETE","nys_url":{"url":"https://data.ny.gov/d/pssf-s7fa"}}
