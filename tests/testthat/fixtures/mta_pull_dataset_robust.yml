        ,{"open_dataset_id":"32ch-sei3","dataset_title":"MTA Subway Service Delivered: Beginning 2015","type":"dataset","agency":"New York City Transit","posting_frequency":"Monthly","description":"Service Delivered measures the percentage of scheduled trains that are actually provided during peak hours on weekdays (7 AM to 10 AM and 4 PM to 7 PM) and weekends (10 AM to 6 PM) for a given month.","status":"PUBLISHED","dataset_created_at":"2022-01-06T21:22:04.000","plan_submission_date":"COMPLETE","nys_url":{"url":"https://data.ny.gov/d/32ch-sei3"}}
        ,{"open_dataset_id":"39hk-dx4f","dataset_title":"MTA Subway Stations","type":"dataset","agency":"New York City Transit","posting_frequency":"As needed","description":"A dataset listing all subway and Staten Island Railway stations, with information on their locations, Station Master Reference Number (MRN), Complex MRN, GTFS Stop ID, the services that stop there, the type of structure the station is on or in, whether the station is in Manhattan’s Central Business District (CBD), and their ADA-accessibility status.","status":"PUBLISHED","dataset_created_at":"2023-09-28T14:27:46.000","plan_submission_date":"COMPLETE","nys_url":{"url":"https://data.ny.gov/d/39hk-dx4f"}}
        ,{"open_dataset_id":"3h5b-5ktz","dataset_title":"MTA Service Alerts: 2012 - 2020","type":"dataset","agency":"New York City Transit, MTA Bus Company, Long Island Rail Road, Metro-North Railroad, Bridges and Tunnels","posting_frequency":"Static - Not Updated","description":"Historic service alerts archived from the GMS system. This dataset captures all revisions of alerts for incidents affecting the transit network prior to 2020. Unlike the current MTA Service Alerts dataset (https://data.ny.gov/d/7kct-peq7), it does not include an event_id or update_number to group updates for a single incident.","status":"PUBLISHED","dataset_created_at":"2025-02-04T20:50:39.000","plan_submission_date":"COMPLETE","nys_url":{"url":"https://data.ny.gov/d/3h5b-5ktz"}}
        ,{"open_dataset_id":"3te2-xtd4","dataset_title":"MTA NYCT Paratransit Max Ride Time Performance: 2018 - 2023","type":"dataset","agency":"New York City Transit","posting_frequency":"Static – Not Updated","description":"Max Ride Time Performance presents the percentage of trips performed with Access-A-Ride’s established max ride time standards between 2018 and 2023. This dataset is now retired as this metric can be calculated from MTA NYCT Paratransit Ride Time (https://data.ny.gov/Transportation/MTA-NYCT-Paratransit-Ride-Time-Beginning-2017/wtm4-vjm7/).","status":"PUBLISHED","dataset_created_at":"2022-01-20T21:45:24.000","plan_submission_date":"COMPLETE","nys_url":{"url":"https://data.ny.gov/d/3te2-xtd4"}}
        ,{"open_dataset_id":"3uhz-sej2","dataset_title":"MTA Colors","type":"dataset","agency":"Metropolitan Transportation Authority","posting_frequency":"As needed","description":"This dataset includes the RGB Hex code and CMYK values for the colors used by the MTA for its various services, including the New York City Subway, the Staten Island Railway, the Long Island Rail Road, Metro-North Railroad, and Bridges & Tunnels, and for the MTA logo itself.","status":"PUBLISHED","dataset_created_at":"2023-08-28T18:12:34.000","plan_submission_date":"COMPLETE","nys_url":{"url":"https://data.ny.gov/d/3uhz-sej2"}}
        ,{"open_dataset_id":"4","dataset_title":"MTA Subway General Orders","status":"Planned","plan_submission_date":"Q2 2026"}
        ,{"open_dataset_id":"426z-f5nc","dataset_title":"MTA Bridges and Tunnels Incident Response Times: Beginning 2010","type":"dataset","agency":"MTA Bridges & Tunnels","posting_frequency":"Monthly","description":"The dataset contains incident response data from B&T’s seven bridges and two tunnels in New York City. Each record represents a monthly summary for a facility with the number of incidents responded to and the average response time for all incidents. Response time is defined as the time elapsed between the reporting of an incident and the arrival of the emergency response vehicle.","status":"PUBLISHED","dataset_created_at":"2025-05-21T12:47:04.000","plan_submission_date":"COMPLETE","nys_url":{"url":"https://data.ny.gov/d/426z-f5nc"}}
        ,{"open_dataset_id":"47iu-idvc","dataset_title":"MTA NYCT Paratransit Provider No-Shows: Beginning 2016","type":"dataset","agency":"New York City Transit","posting_frequency":"Monthly","description":"This metric measures the frequency with which primary providers do not arrive at the pick-up location within 30 minutes of the promised time and the trip is not provided.","status":"PUBLISHED","dataset_created_at":"2022-01-20T21:56:46.000","plan_submission_date":"COMPLETE","nys_url":{"url":"https://data.ny.gov/d/47iu-idvc"}}
        ,{"open_dataset_id":"4qd6-ptxx","dataset_title":"MTA Metro-North Mean Distance Between Failures: Beginning 2018","type":"dataset","agency":"Metro-North Railroad","posting_frequency":"Monthly","description":"Mean Distance Between Failures represents the number of miles a rail car travels before a mechanical failure makes the train arrive at its final destination more than 5 minutes and 59 seconds later than scheduled. This measures the reliability of equipment in revenue service.","status":"PUBLISHED","dataset_created_at":"2023-06-06T15:49:37.000","plan_submission_date":"COMPLETE","nys_url":{"url":"https://data.ny.gov/d/4qd6-ptxx"}}
        ,{"open_dataset_id":"4ta5-wz5s","dataset_title":"MTA Subway Station Complexes","type":"dataset","agency":"New York City Transit","posting_frequency":"As needed","description":"A dataset listing all station complexes in the subway system. Station complexes are collections of stations which are interconnected by passageways within fare control or are stations on different levels that are not parallel to each other and that are connected by stairways, escalators, or elevators.","status":"PUBLISHED","dataset_created_at":"2023-09-28T14:45:27.000","plan_submission_date":"COMPLETE","nys_url":{"url":"https://data.ny.gov/d/4ta5-wz5s"}}
        ,{"open_dataset_id":"4tpr-3bvc","dataset_title":"MTA Express Bus Capacity: April 2023 - September 2023","type":"dataset","agency":"Metropolitan Transportation Authority","posting_frequency":"Static - Not Updated","description":"This dataset provides the load percentage for each express bus route at its maximum load point (the bus stop where the highest number of passengers are on the bus) by direction, hour, day type (weekday, weekends and holidays), aggregated by week.","status":"PUBLISHED","dataset_created_at":"2023-10-13T19:22:02.000","plan_submission_date":"COMPLETE","nys_url":{"url":"https://data.ny.gov/d/4tpr-3bvc"}}
        ,{"open_dataset_id":"4y8j-9pkd","dataset_title":"MTA Permanent Art Catalog: Beginning 1980","type":"dataset","agency":"MTA Headquarters","posting_frequency":"Annually","description":"Through the Permanent Art Program, MTA Arts & Design (formerly Arts for Transit) commissions public art that is seen by millions of city-dwellers as well as national and international visitors who use the MTA’s subways and trains. Arts & Design works closely with the architects and engineers at MTA NYC Transit, Long Island Rail Road and Metro-North Railroad to determine the parameters and sites for the artwork that is to be incorporated into each station scheduled for renovation. A diversity of well-established, mid-career and emerging artists contribute to the growing collection of works created in the materials of the system -mosaic, ceramic, tile, bronze, steel and glass. Artists are chosen through a competitive process that uses selection panels comprised of visual arts professionals and community representatives which review and select artists. This data provides the branch or station and the artist and artwork information.","status":"PUBLISHED","dataset_created_at":"2013-04-25T15:16:07.000","plan_submission_date":"COMPLETE","nys_url":{"url":"https://data.ny.gov/d/4y8j-9pkd"}}
        ,{"open_dataset_id":"5","dataset_title":"MTA Subway Station Public Restroom Inventory","status":"Planned","plan_submission_date":"Q2 2026"}
        ,{"open_dataset_id":"559g-c57t","dataset_title":"MTA Current Bus Routes Map","type":"map","agency":"Metropolitan Transportation Authority","posting_frequency":"As needed","description":"This dataset contains polyline geometries and metadata for distinct bus route shapes by route and direction across schedule bundles.","status":"PUBLISHED","dataset_created_at":"2026-01-09T15:09:39.000","plan_submission_date":"COMPLETE","nys_url":{"url":"https://data.ny.gov/d/559g-c57t"}}
