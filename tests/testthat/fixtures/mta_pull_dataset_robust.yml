        ,{"open_dataset_id":"2xh4-m2qk","dataset_title":"MTA Workplace Violence Penal Law Incidents: Beginning 2019","type":"dataset","agency":"Metropolitan Transportation Authority","posting_frequency":"Monthly","description":"This dataset reflects the monthly number of employee-reported incidents of workplace violence, as defined by New York State Labor Law Section 27-B, against on-duty MTA employees. This dataset divides workplace violence incidents into groupings according to New York State Penal Law Related Offenses. The same data is available in the MTA Workplace Violence Labor Law Incidents dataset, which divides the data as reported pursuant to New York State Labor Law Section 27-B.","status":"PUBLISHED","dataset_created_at":"2023-05-18T14:03:51.000","plan_submission_date":"COMPLETE","nys_url":{"url":"https://data.ny.gov/d/2xh4-m2qk"}}
        ,{"open_dataset_id":"2zyn-jc9t","dataset_title":"MTA Wi-Fi Locations Map","type":"map","agency":"MTA Real Estate Department","posting_frequency":"Quarterly","description":"The MTA contracts with Transit Wireless WIFI (http://www.transitwirelesswifi.com) to provide WIFI access in its subway locations. Transit Wireless maintains location data where WIFI access is available.","status":"PUBLISHED","dataset_created_at":"2022-04-11T23:03:07.000","plan_submission_date":"COMPLETE","nys_url":{"url":"https://data.ny.gov/d/2zyn-jc9t"}}
