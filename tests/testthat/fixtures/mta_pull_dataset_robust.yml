        ,{"open_dataset_id":"qsdd-gb3s","dataset_title":"MTA 2025-2044 20-Year Needs Assessment Asset Conditions","type":"dataset","agency":"Metropolitan Transportation Authority","posting_frequency":"Static – Not Updated","description":"The 2025-2044 20-Year Needs Assessment is a broad, comprehensive blueprint that outlines the MTA region's transportation capital needs for the next generation. It provides an extensive, long-term view based upon rigorous data analysis across all the MTA agencies. The MTA developed a three-part plan to for the next 20 years to achieve the transit network New Yorkers deserve. It is based on three fundamental ideas: rebuild the foundation of the system to ensure its survival, improve our network to meet 21st century needs, and expand to support future growth. This dataset includes data on the conditions of most assets in the MTA system.","status":"PUBLISHED","dataset_created_at":"2023-10-20T12:51:05.000","plan_submission_date":"COMPLETE","nys_url":{"url":"https://data.ny.gov/d/qsdd-gb3s"}}
