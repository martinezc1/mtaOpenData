        ,{"open_dataset_id":"58t6-89vi","dataset_title":"MTA Bus Route Segment Speeds: 2023 - 2024","type":"dataset","agency":"New York City Transit, MTA Bus Company","posting_frequency":"Static - Not Updated","description":"This dataset provides data on how fast buses are traveling between pairs of subsequent timepoints (the major stops on a bus route) for every bus route in the system. It will provide the average speed in miles per hour between pairs of timepoints, the average travel time in minutes, the road distance in miles, and the number of bus trips for each bus route aggregated by month, day of the week, and hour of day. It also provides the type of bus trip (Local, Limited, SBS, Express, School), the borough of the bus route, the names of the timepoints, their coordinates, and the stop sequence order of the first two timepoints in a pair.","status":"PUBLISHED","dataset_created_at":"2024-08-28T20:49:14.000","plan_submission_date":"COMPLETE","nys_url":{"url":"https://data.ny.gov/d/58t6-89vi"}}
