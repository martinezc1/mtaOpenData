        ,{"open_dataset_id":"q2wi-uth2","dataset_title":"MTA NaviLens Feedback Survey","type":"dataset","agency":"New York City Transit, MTA Bus Company","posting_frequency":"Static - Not Updated","description":"This dataset contains responses from the MTA NaviLens feedback survey, which collects customer feedback on NaviLens and NaviLens GO, two accessibility and wayfinding smartphone apps used with brightly colored NaviLens codes installed across select MTA subway stations, subway cars, bus stops, and buses. This data supports evaluation of the NaviLens deployment and related project reporting, including work funded through the USDOT SMART Grant.","status":"PUBLISHED","dataset_created_at":"2026-01-09T17:43:08.000","plan_submission_date":"COMPLETE","nys_url":{"url":"https://data.ny.gov/d/q2wi-uth2"}}
        ,{"open_dataset_id":"q43a-ygsk","dataset_title":"MTA 2025-2044 20-Year Needs Assessment Comparative Evaluation","type":"dataset","agency":"Metropolitan Transportation Authority","posting_frequency":"Static – Not Updated","description":"The 2025-2044 20-Year Needs Assessment Comparative Evaluation is a framework which assesses the costs and benefits of potential expansions and enhancements. All potential projects are evaluated using a consistent set of models, tools, and criteria including ridership, time savings, network resilience and sustainability, capacity, equity, network leverage, geographic distribution, and cost. The most promising projects may be advanced for further study and possible inclusion in future capital plans. To view the full comparative evaluation and further details on the methodology, visit future.mta.info.","status":"PUBLISHED","dataset_created_at":"2023-10-23T12:42:47.000","plan_submission_date":"COMPLETE","nys_url":{"url":"https://data.ny.gov/d/q43a-ygsk"}}
