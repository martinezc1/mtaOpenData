        ,{"open_dataset_id":"yfdc-w5jh","dataset_title":"MTA Central Business District Taxi Zones","type":"dataset","agency":"Metropolitan Transportation Authority","posting_frequency":"As needed","description":"This dataset consists of a set of polygons that will allow users of New York City Taxi and Limousine Commission data on trip records for taxi and for-hire vehicle trips to determine which trips originate and/or end in a Taxi Zone in the Central Business District and are thus subjected to the CBD Tolling Program. TLC trip record data is available on NYC Open Data in separate datasets each year for yellow taxis, green taxis, for-hire vehicles (FHVs) dispatched by a high-volume for-hire vehicle service (HVFHVs), and other FHVs.","status":"PUBLISHED","dataset_created_at":"2024-06-18T20:33:31.000","plan_submission_date":"COMPLETE","nys_url":{"url":"https://data.ny.gov/d/yfdc-w5jh"}}
