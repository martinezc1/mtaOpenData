        ,{"open_dataset_id":"5754-yujh","dataset_title":"MTA Pulse Survey: Beginning 2025","type":"dataset","agency":"New York City Transit","posting_frequency":"Monthly","description":"The Pulse Survey dataset provides customer sentiment and satisfaction results across MTA service modes. The dataset is organized as survey output records (not individual-level responses) and includes fields such as month, time period, mode, bus type, question text, category, measure, score grain, score type, score, and sample size.","status":"PUBLISHED","dataset_created_at":"2026-03-09T13:51:15.000","plan_submission_date":"COMPLETE","nys_url":{"url":"https://data.ny.gov/d/5754-yujh"}}
        ,{"open_dataset_id":"58t6-89vi","dataset_title":"MTA Bus Route Segment Speeds: 2023 - 2024","type":"dataset","agency":"New York City Transit, MTA Bus Company","posting_frequency":"Static - Not Updated","description":"This dataset provides data on how fast buses are traveling between pairs of subsequent timepoints (the major stops on a bus route) for every bus route in the system. It will provide the average speed in miles per hour between pairs of timepoints, the average travel time in minutes, the road distance in miles, and the number of bus trips for each bus route aggregated by month, day of the week, and hour of day. It also provides the type of bus trip (Local, Limited, SBS, Express, School), the borough of the bus route, the names of the timepoints, their coordinates, and the stop sequence order of the first two timepoints in a pair.","status":"PUBLISHED","dataset_created_at":"2024-08-28T20:49:14.000","plan_submission_date":"COMPLETE","nys_url":{"url":"https://data.ny.gov/d/58t6-89vi"}}
        ,{"open_dataset_id":"5f5g-n3cz","dataset_title":"MTA Subway Stations and Complexes","type":"dataset","agency":"New York City Transit","posting_frequency":"As needed","description":"A dataset listing all subway and Staten Island Railway stations, with data aggregated by station complex. This dataset includes information on station names, their locations, Station IDs, Complex IDs, GTFS Stop IDs, the services that stop there, the type of structure the station is on or in, whether they are in Manhattan’s Central Business District (CBD), and their ADA-accessibility status.","status":"PUBLISHED","dataset_created_at":"2023-10-11T21:05:04.000","plan_submission_date":"COMPLETE","nys_url":{"url":"https://data.ny.gov/d/5f5g-n3cz"}}
        ,{"open_dataset_id":"5wq4-mkjj","dataset_title":"MTA Subway Hourly Ridership: Beginning 2025","type":"dataset","agency":"New York City Transit, Staten Island Railway, Roosevelt Island Operating Corporation","posting_frequency":"Weekly","description":"This dataset provides subway ridership estimates on an hourly basis by subway station complex and class of fare payment.","status":"PUBLISHED","dataset_created_at":"2024-11-21T18:53:58.000","plan_submission_date":"COMPLETE","nys_url":{"url":"https://data.ny.gov/d/5wq4-mkjj"}}
