        ,{"open_dataset_id":"68hr-j2j7","dataset_title":"MTA Subway Entrances and Exits: 2024 Map","type":"map","agency":"New York City Transit","posting_frequency":"Static - Not updated","description":"This is a dataset containing the entrances and exits at New York City Subway and Staten Island Railway stations. Information is provided on the entrance or exit, including their coordinates, the borough they are in, whether it allows entries and exits, and the type of entrance (more information below). The dataset also includes the name of the station complex, the complex ID number, the name of the specific station in the complex the entrance is for (constituent station), the station ID number, the GTFS Stop ID, the daytime routes that stop at the station complex, and the line and division the constituent station is on.","status":"PUBLISHED","dataset_created_at":"2023-08-18T22:14:11.000","plan_submission_date":"COMPLETE","nys_url":{"url":"https://data.ny.gov/d/68hr-j2j7"}}
